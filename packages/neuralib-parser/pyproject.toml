[project]
name = "neuralib-parser"
version = "0.7.1"
requires-python = ">=3.11,<3.13"
description = "Parsers for output from open-source packages or specific devices"
authors = [
    { name = "Yu-Ting Wei", email = "ytsimon2004@gmail.com" },
    { name = "Ta-Shun Su", email = "antoniost29@gmail.com" }
]
license = { text = "BSD-3-Clause" }
readme = "README.md"
keywords = ["Parser", "Segmentation", "Morphology"]
classifiers = [
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: BSD License",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering",
    'Intended Audience :: Science/Research',
    "Typing :: Typed",
]

dependencies = [
    "neuralib-utils[all]>=0.7.0",
    "numpy",
    "argclz"
]

[project.optional-dependencies]

cellpose = ["roifile"]
suite2p = ["neuralib-imaging>=0.7.0", "numba>=0.63"]
czi = ["aicspylibczi", "xmltodict"]
sbx = ["sbxreader"]
opt = ["roifile", "tensorflow", "napari", "csbdeep", "roifile", "tables", "vedo"]

test = [
    "neuralib-parser[all]",
    "stardist>=0.9.2",
]

all = [
    "neuralib-parser[suite2p]",
    "neuralib-parser[sbx]",
    "neuralib-parser[cellpose]",
    "neuralib-parser[czi]",
    "neuralib-parser[opt]",
    "tifffile",
    "ruamel.yaml" # dlc?
]



[project.urls]
Homepage = "https://github.com/ytsimon2004/neuralib2"
Documentation = "https://neuralib2.readthedocs.io/en/latest/index.html"
Repository = "https://github.com/ytsimon2004/neuralib2"
Issues = "https://github.com/ytsimon2004/neuralib2/issues"

[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools>=61.0"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"neuralib.cellpose" = ["py.typed"]
"neuralib.deeplabcut" = ["py.typed"]
"neuralib.facemap" = ["py.typed"]
"neuralib.morpho" = ["py.typed"]
"neuralib.scan" = ["py.typed"]
"neuralib.scanbox" = ["py.typed"]
"neuralib.stardist" = ["py.typed"]
"neuralib.suite2p" = ["py.typed"]
